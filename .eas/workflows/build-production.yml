name: Build production apps

# master branchga push qilinganda avtomatik ishga tushadi va
# Android (app-bundle) hamda iOS uchun production build yaratadi.
# Bu bosqich do'konlarga avtomatik topshirmaydi (submit qilmaydi) —
# store'ga chiqarish alohida, qo'lda ishga tushiriladigan
# build-and-submit.yml workflow orqali amalga oshiriladi.
on:
  push:
    branches: ['master']

jobs:
  build_android:
    name: Build Android (production)
    type: build
    params:
      platform: android
      profile: production
  build_ios:
    name: Build iOS (production)
    type: build
    params:
      platform: ios
      profile: production
