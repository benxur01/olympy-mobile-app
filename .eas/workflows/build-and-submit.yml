name: Build and submit to stores

# Faqat qo'lda ishga tushiriladi (avtomatik trigger yo'q):
#   eas workflow:run .eas/workflows/build-and-submit.yml
# yoki Expo dashboard > Workflows bo'limidan "Run" tugmasi orqali.
# Google Play va App Store'ga haqiqiy chiqarishdan oldin qo'lda
# tasdiqlash kerak bo'lgani uchun bu ataylab push'ga bog'lanmagan.
#
# Ishlatishdan oldin submit uchun credentiallar sozlangan bo'lishi kerak:
#   - Android: Google Service Account JSON (eas credentials)
#   - iOS: App Store Connect API Key + Apple Team ID (eas credentials)

jobs:
  build_android:
    name: Build Android (production)
    type: build
    params:
      platform: android
      profile: production
  build_ios:
    name: Build iOS (production)
    type: build
    params:
      platform: ios
      profile: production
  submit_android:
    name: Submit Android to Play Store
    needs: [build_android]
    type: submit
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
  submit_ios:
    name: Submit iOS to App Store
    needs: [build_ios]
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
